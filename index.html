<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSF FUNAAB Digital Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Symmetrical Hero Header -->
    <header class="site-header">
        <div class="container header-container">
            <!-- Added an alt-text fallback style so it looks clean even if the image breaks -->
            <div class="logo-wrapper">
                <img src="logo.png" alt="GSF Logo" class="brand-logo">
            </div>
            <div class="header-text">
                <h1>GOFAMINT Students' Fellowship</h1>
                <p>FUNAAB Digital Library & Reading Resources</p>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Grid now centers items when there are only a few -->
        <section class="book-grid">
            
            <article class="book-card">
                <div class="book-cover">
                    <span>📖</span> 
                </div>
                <div class="book-content">
                    <div class="book-info">
                        <h2>The Pilgrim's Progress</h2>
                        <p class="author">John Bunyan</p>
                    </div>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="btn">Read Now</a>
                </div>
            </article>

            <article class="book-card">
                <div class="book-cover">
                    <span>📘</span>
                </div>
                <div class="book-content">
                    <div class="book-info">
                        <h2>Knowing God</h2>
                        <p class="author">J.I. Packer</p>
                    </div>
                    <a href="#" target="_blank" rel="noopener noreferrer" class="btn">Read Now</a>
                </div>
            </article>

        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 GSF FUNAAB. All resources are for educational and spiritual growth purposes.</p>
    </footer>

</body>
</html>
